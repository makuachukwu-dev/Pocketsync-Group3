<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="login-screen">

    <div class="login-header">
       <img src="assets/images/Design System/Frame 90.png" alt="logo" class="login-logo">
        <h1>Welcome Back</h1>

        <p class="login-subtitle">
            Log in to view your account
        </p>
    </div>

    <form class="login-form">

        <div class="form-group">
            <label for="email">Email Address</label>

            <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="form-group">

            <label for="password">Password</label>

            <div class="password-wrapper">

                <input type="password" id="password" placeholder="••••••••">
                   
                <button
                    type="button"
                    class="toggle-password">
                    Show
                </button>

            </div>

        </div>

        <a href="forgot-password.html"
           class="forgot-password">
            Forgot Password?
        </a>

        <button
            type="submit"
            class="primary-btn">
            Login
        </button>

    </form>

    <div class="divider">

        <span class="line"></span>

        <span class="divider-text">
            Or continue with
        </span>

        <span class="line"></span>

    </div>

    <div class="social-buttons">

        <button class="social-btn google-btn">

            <img
                src="assets/images/Design System/LoginScreen.png" alt="Google">

            <span>Google</span>

        </button>

        <button class="social-btn apple-btn">

            <img
                src="assets/images/Design System/LoginScreen (1).png" alt="Apple">

            <span>Apple</span>

        </button>

    </div>

   <p class="signup-text">
       Don't have an account?
        <a href="signup.html" class="signup-link">
           Sign Up
        </a>
    </p>

</main>

 <script src="js/app.js"></script>
    
</body>
</html>
