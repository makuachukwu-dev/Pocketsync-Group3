<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empty Dashboard</title>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="dashboard-empty">

        <header class="dashboard-header">

    <div class="dashboard-top">
        <img src="assets/images/Design System/Frame 90.png" alt="PocketSync">

        <button class="profile-btn">
            <i class="fa-regular fa-user"></i>
        </button>
    </div>

    <div class="dashboard-greeting">
        <h2 id="userGreeting">Hello 👋</h2>
        <p>Welcome to your financial overview</p>
    </div>

</header>
        <section class="empty-state">

            <img
                src="assets/images/Design System/Group 70.png"
                alt="No accounts"
                class="empty-illustration">

            <h2>No accounts connected yet</h2>

            <p>
                Link your bank and fintech accounts to see all your bank balances in one place.
            </p>


            <button class="primary-btn" onclick="window.location.href='institution-selection.html'">
                + Link Your First Account
            </button>
        </section>

        <div class="security-note">
            <img src="assets/images/Design System/Frame 10.png" alt="Security">

            <h4>Your data is encrypted and secure</h4>

            <p>We never store your banking passwords</p>
        </div>

        <nav class="bottom-nav">
          <a href="#" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
          </a>

         <a href="#" class="nav-item">
            <i class="fa-regular fa-credit-card"></i>
            <span>Accounts</span>
         </a>
 
          <a href="#" class="nav-item">
            <i class="fa-solid fa-gear"></i>
            <span>Settings</span>
          </a>
        </nav>

        
    </main>
 <script src="app.js"></script>
</body>
</html>
