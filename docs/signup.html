<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<main class="login-screen">

    <div class="login-header">

        <img src="assets/images/Design System/Frame 90.png" alt="logo">

        <h1>Welcome</h1>

        <p class="login-subtitle">
            Sign up to link your accounts
        </p>

    </div>

    <form class="signup-form">

        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="John">
        </div>

        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Doe">
        </div>

        <div class="form-group">
            <label for="signupEmail">Email Address</label>
            <input type="email" id="signupEmail" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label for="signupPassword">Password</label>

            <div class="password-wrapper">
                <input type="password" id="signupPassword" placeholder="••••••••">
            </div>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>

            <div class="password-wrapper">
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
        </div>

        <button type="submit" class="primary-btn">
            Sign Up
        </button>

    </form>

    <div class="divider">

        <span class="line"></span>

        <span class="divider-text">
            Or continue with
        </span>

        <span class="line"></span>

    </div>

    <div class="social-buttons">

        <button class="social-btn google-btn" type="button">

            <img
                src="assets/images/Design System/LoginScreen.png"
                alt="Google">

            <span>Google</span>

        </button>

        <button class="social-btn apple-btn" type="button">

            <img
                src="assets/images/Design System/LoginScreen (1).png"
                alt="Apple">

            <span>Apple</span>

        </button>

    </div>

    <p class="signup-text">
        Already have an account?
        <a href="login.html" class="signup-link">
            Sign In
        </a>
    </p>

</main>

<script src="js/app.js"></script>

</body>
</html>
