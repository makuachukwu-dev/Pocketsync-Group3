<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institution Login</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">


</head>
<body>


<main class="institution-login-screen">

    
    <div class="institution-header">

        <button
            class="back-btn"
            onclick="history.back()">
            ×
        </button>

        <div class="secure-text">
            🔒 SECURE CONNECTION
        </div>

    </div>

    
    <div class="institution-content">

        
        <div class="logo-container">

            <img
                id="bankLogo"
                src="assets/images/Design System/Frame 81.png"
                alt="Bank Logo"
                class="institution-logo">

        </div>

        <h2>Connect to Bank</h2>

        <p class="institution-description">
            Enter your credentials to securely link your account with PocketSync.
        </p>

        
        <form class="institution-form">

            <div class="form-group">

                <label for="accountNumber">
                    Account Number / Phone Number
                </label>

                <input
                    type="text"
                    id="accountNumber"
                    placeholder="Enter your Account Number">

            </div>

            <div class="form-group">

                <label for="bankPassword">
                    Password / PIN
                </label>

                <input
                    type="password"
                    id="bankPassword"
                    placeholder="Enter your password">

            </div>

        </form>

        
        <div class="security-note">

            <img
                src="assets/images/Design System/Icon.png"
                alt="Security"
                class="security-icon">

            <p>
                Your credentials are encrypted and never stored by PocketSync.
                Connection is established via secure API.
            </p>

        </div>

    </div>

    
    <div class="institution-actions">

        <button
            class="primary-btn"
            onclick="connectAccount()">
            Connect Account →
        </button>

        <button
            class="cancel-btn"
            onclick="history.back()">
            Cancel
        </button>

    </div>

</main>

<script src="js/app.js"></script>

</body>
</html>
